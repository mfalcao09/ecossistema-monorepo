# Registry inicial de agentes — Ecossistema V9
# Fonte primária: .agent_ids.json (criado por claudinho_orchestrator.py --setup)
# Este YAML serve como fallback e documentação
#
# Quando S11 (C-Suite templates) for entregue, novos agentes serão adicionados aqui.

agents:
