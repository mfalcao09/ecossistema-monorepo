name: Security Scan (OWASP ZAP)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Weekly scan on Monday at 4AM UTC
    - cron: '0 4 * * 1'

env:
  NODE_VERSION: '20'
  APP_PORT: '3000'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diploma_digital_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # 1. Checkout Code
      # ─────────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────────────────────────────────
      # 2. Setup Node.js
      # ─────────────────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ─────────────────────────────────────────────────────────────────────────
      # 3. Install Dependencies
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci
        env:
          npm_audit_level: high

      # ─────────────────────────────────────────────────────────────────────────
      # 4. Lint Code
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────────────────
      # 5. Build Application
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://localhost:3000' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-key' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-key' }}

      # ─────────────────────────────────────────────────────────────────────────
      # 6. Start Application
      # ─────────────────────────────────────────────────────────────────────────
      - name: Start Next.js application
        run: npm start &
        env:
          PORT: ${{ env.APP_PORT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://localhost:3000' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-key' }}

      # ─────────────────────────────────────────────────────────────────────────
      # 7. Wait for Application to Start
      # ─────────────────────────────────────────────────────────────────────────
      - name: Wait for application to be ready
        run: |
          npx wait-on http://localhost:${{ env.APP_PORT }} \
            --timeout 60000 \
            --interval 1000 \
            --verbose
        timeout-minutes: 2

      # ─────────────────────────────────────────────────────────────────────────
      # 8. OWASP ZAP Baseline Scan
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:${{ env.APP_PORT }}'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -r report_baseline.html'
          allowList_file_name: '.zap/allowlist.conf'
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────────────────
      # 9. OWASP ZAP API Scan (if API documentation exists)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run OWASP ZAP API Scan
        if: hashFiles('openapi.yml', 'openapi.json', 'docs/openapi.*') != ''
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'http://localhost:${{ env.APP_PORT }}/api'
          format: 'openapi'
          report_title: 'ZAP API Security Report'
        continue-on-error: true

      # ─────────────────────────────────────────────────────────────────────────
      # 10. Upload ZAP Report
      # ─────────────────────────────────────────────────────────────────────────
      - name: Upload ZAP Baseline Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_baseline.html
          retention-days: 30

      - name: Upload ZAP API Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-api-report
          path: report_api.html
          retention-days: 30

      # ─────────────────────────────────────────────────────────────────────────
      # 11. Parse ZAP Results & Comment on PR
      # ─────────────────────────────────────────────────────────────────────────
      - name: Parse ZAP Results
        if: github.event_name == 'pull_request'
        run: |
          if [ -f "report_baseline.html" ]; then
            echo "## Security Scan Results (OWASP ZAP)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✓ ZAP Baseline scan completed" >> $GITHUB_STEP_SUMMARY
            echo "📊 [View detailed report](artifacts)" >> $GITHUB_STEP_SUMMARY
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # 12. Fail on Critical Issues
      # ─────────────────────────────────────────────────────────────────────────
      - name: Check for critical vulnerabilities
        run: |
          if grep -q "FAIL" report_baseline.html 2>/dev/null; then
            echo "⚠️ Critical vulnerabilities found in ZAP report"
            # Uncomment to fail the workflow on critical issues:
            # exit 1
          else
            echo "✓ No critical vulnerabilities detected"
          fi
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # Dependency Audit Job (separate from ZAP scanning)
  # ───────────────────────────────────────────────────────────────────────────
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          AUDIT_JSON=$(npm audit --json 2>/dev/null || echo '{}')
          CRITICAL=$(echo "$AUDIT_JSON" | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT_JSON" | jq '.metadata.vulnerabilities.high // 0')

          echo "## Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Critical vulnerabilities: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- High vulnerabilities: $HIGH" >> $GITHUB_STEP_SUMMARY

          if [ "$CRITICAL" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Found $CRITICAL critical vulnerabilities**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # Code Quality & Type Checking
  # ───────────────────────────────────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type checking
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Check for linting issues
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # Report Summary
  # ───────────────────────────────────────────────────────────────────────────
  report:
    runs-on: ubuntu-latest
    needs: [build-and-scan, npm-audit, type-check]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Generate Security Report Summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP | ${{ needs.build-and-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [ZAP Baseline Report](artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- [ZAP API Report](artifacts)" >> $GITHUB_STEP_SUMMARY
