# OWASP ZAP Allowlist Configuration
# URLs/patterns that should be excluded from scanning
# Used by zaproxy/action-baseline GitHub Action

# ── Next.js Framework Routes ────────────────────────────────────────────────
# Skip Next.js built-in routes that are not part of the application
/_next/*
/_static/*
/_vercel/*

# ── Development/Testing Routes ──────────────────────────────────────────────
/__tests__/*
/test/*
/__mocks__/*

# ── Well-known Routes ──────────────────────────────────────────────────────
/.well-known/*
/robots.txt
/sitemap.xml
/manifest.json

# ── API Routes to Skip (if needed) ─────────────────────────────────────────
# Uncomment to skip specific endpoints during scanning
# /api/cron/*
# /api/webhooks/*
