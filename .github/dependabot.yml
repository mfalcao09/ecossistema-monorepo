version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Campo_Grande"
    open-pull-requests-limit: 10
    groups:
      dev-tools:
        patterns:
          - "@types/*"
          - "vitest*"
          - "@vitest/*"
          - "eslint*"
          - "typescript"
          - "prettier"
          - "husky"
          - "lint-staged"
          - "turbo"
      anthropic:
        patterns:
          - "@anthropic-ai/*"
      supabase:
        patterns:
          - "@supabase/*"
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright*"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: /apps/orchestrator
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /apps/memory-consolidator
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 10
