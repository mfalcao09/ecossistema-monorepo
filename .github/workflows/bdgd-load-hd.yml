name: BDGD Load HD (Tier 2 — Alta Precisão por Projeto)

on:
  workflow_dispatch:
    inputs:
      development_id:
        description: "UUID do projeto (developments.id)"
        required: true
        type: string
      buffer_km:
        description: "Raio em km a partir do polígono (default 5)"
        required: false
        type: string
        default: "5"

jobs:
  load_hd:
    name: Load HD para projeto
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 2h é mais que suficiente: 1-3 distribuidoras por projeto

    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL + psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gdal-bin postgresql-client unzip ca-certificates

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run HD loader
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python3 apps/intentus/scripts/load_bdgd_hd.py \
            --development-id "${{ inputs.development_id }}" \
            --buffer-km "${{ inputs.buffer_km }}"
