name: Security Scan

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependencies-node:
    name: Dependency audit (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

  dependencies-python:
    name: Dependency audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install safety
        run: pip install safety --quiet

      - name: Audit orchestrator dependencies
        run: |
          if [ -f "apps/orchestrator/requirements.txt" ]; then
            safety check -r apps/orchestrator/requirements.txt
          elif [ -f "apps/orchestrator/pyproject.toml" ]; then
            pip install -e "apps/orchestrator[dev]" --quiet
            safety check
          fi
        continue-on-error: true

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [typescript, python]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
