name: E2E Suite

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      scenario:
        description: "Run specific scenario (leave blank for all)"
        required: false
        default: ""

concurrency:
  group: e2e-suite
  cancel-in-progress: false

jobs:
  e2e:
    name: E2E cross-package tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build packages
        run: pnpm turbo build

      - name: Run E2E scenarios
        run: |
          cd tests/e2e
          if [ -n "${{ github.event.inputs.scenario }}" ]; then
            npx playwright test "${{ github.event.inputs.scenario }}"
          else
            npx playwright test
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::E2E suite failed. Check the Playwright report artifact."
