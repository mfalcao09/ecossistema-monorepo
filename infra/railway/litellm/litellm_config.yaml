# ============================================================
# LiteLLM Config V9 — Ecossistema de Inovação e IA
# Fonte: MASTERPLAN-V9.md § 33 (Padrão 10 — LiteLLM Router)
# e § 34 (Stack validada).
#
# Provider único: OpenRouter (sk-or-v1-*)
# - 1 chave para todos os modelos (Claude, GPT, Gemini, Llama, DeepSeek)
# - OpenRouter markup ~5-10% vs direto; aceitável no piloto
# - MariTalk NÃO está no OpenRouter — adicionar direto quando FIC precisar
# ============================================================

model_list:
  # --------------- Claude family (primário V9) ---------------
  - model_name: sonnet-4-6
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 1000
      timeout: 300
      max_retries: 2

  - model_name: haiku-4-5
    litellm_params:
      model: openrouter/anthropic/claude-haiku-4.5
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 2000

  - model_name: opus-4-6
    litellm_params:
      model: openrouter/anthropic/claude-opus-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200
      timeout: 600

  # --------------- OpenAI (fallback principal) ---------------
  - model_name: gpt-4o-mini
    litellm_params:
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 500

  - model_name: gpt-4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200

  # --------------- Google Gemini (fallback extra) ---------------
  - model_name: gemini-2-5-flash
    litellm_params:
      model: openrouter/google/gemini-2.5-flash
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 300

  # --------------- Open source (experimentação + fallback barato) ---------------
  - model_name: llama-3-3-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200

  - model_name: deepseek-chat
    litellm_params:
      model: openrouter/deepseek/deepseek-chat
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 200

# ============================================================
# Router settings (Padrão 10 canônico V9 § 33)
# ============================================================
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_policy:
    TimeoutError: 2
    RateLimitError: 3
    InternalServerError: 2
    APIError: 2
  allowed_fails: 3
  cooldown_time: 60

  # Fallback canônico V9 § 33, ajustado para modelos reais via OpenRouter:
  # sonnet-4-6 → haiku-4-5 → gpt-4o-mini → gemini-2-5-flash
  fallbacks:
    - sonnet-4-6: [haiku-4-5, gpt-4o-mini, gemini-2-5-flash]
    - haiku-4-5: [gpt-4o-mini, gemini-2-5-flash]
    - opus-4-6: [sonnet-4-6, haiku-4-5]
    - gpt-4o: [sonnet-4-6, gpt-4o-mini]
    - gpt-4o-mini: [haiku-4-5, gemini-2-5-flash]
    - gemini-2-5-flash: [haiku-4-5, gpt-4o-mini]
    - llama-3-3-70b: [deepseek-chat, haiku-4-5]
    - deepseek-chat: [llama-3-3-70b, haiku-4-5]

  context_window_fallbacks:
    - sonnet-4-6: [opus-4-6]
    - haiku-4-5: [sonnet-4-6]

  content_policy_fallbacks:
    - sonnet-4-6: [gpt-4o]
    - haiku-4-5: [gpt-4o-mini]

  # Cache de respostas idênticas (Redis)
  cache_responses: true
  cache_kwargs:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    ttl: 3600

# ============================================================
# General settings
# ============================================================
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # JWT Auth é feature Enterprise do LiteLLM — ficamos no master key + virtual keys
  enable_jwt_auth: false
  proxy_batch_write_at: 60
  ui_access_mode: admin_only
  allow_requests_on_db_unavailable: false
  health_check_interval: 300
  alerting_threshold: 300

# ============================================================
# Callbacks — observability (Langfuse configurado em S9)
# ============================================================
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # langfuse_public_key / secret via env vars:
  #   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST

  drop_params: true       # drop params não-suportados pelo provider
  set_verbose: false      # prod
  telemetry: false        # não envia para LiteLLM cloud
